version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: book-lending-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - book-lending-network
    depends_on:
      - db

  webserver:
    image: nginx:alpine
    container_name: book-lending-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./nginx/conf.d/:/etc/nginx/conf.d/
    networks:
      - book-lending-network

  db:
    image: mysql:8.0
    container_name: book-lending-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: book_lending
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: secret
      MYSQL_USER: book_lending_user
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - book-lending-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: book-lending-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    networks:
      - book-lending-network

networks:
  book-lending-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
