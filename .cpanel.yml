# cPanel Git Deployment Configuration for Laravel Book Lending Application
# Official cPanel Git deployment format
# https://docs.cpanel.net/knowledge-base/web-services/guide-to-git-deployment/

--- deployment:
  tasks:
    # Deploy Laravel files to current directory (relative path)
    # This assumes the repository is cloned into the target directory
    
    # Copy Laravel files (excluding development files)
    - /bin/cp -R app ./
    - /bin/cp -R bootstrap ./
    - /bin/cp -R config ./
    - /bin/cp -R database ./
    - /bin/cp -R lang ./
    - /bin/cp -R public ./
    - /bin/cp -R resources ./
    - /bin/cp -R routes ./
    - /bin/cp -R storage ./
    - /bin/cp -R vendor ./
    - /bin/cp artisan ./
    - /bin/cp composer.json ./
    - /bin/cp composer.lock ./
    - /bin/cp .env.example ./
    
    # Set proper permissions
    - /bin/chmod -R 755 storage bootstrap/cache
    - /bin/chmod 644 .env.example
    
    # Laravel optimization commands
    - /usr/local/bin/php artisan config:clear
    - /usr/local/bin/php artisan config:cache
    - /usr/local/bin/php artisan route:clear
    - /usr/local/bin/php artisan route:cache
    - /usr/local/bin/php artisan view:clear
    - /usr/local/bin/php artisan view:cache
    - /usr/local/bin/php artisan migrate --force
    
    # Create storage directories if they don't exist
    - /bin/mkdir -p storage/framework/cache storage/framework/sessions storage/framework/views storage/logs
    
    # Set writable permissions for storage
    - /bin/chmod -R 755 storage bootstrap/cache
