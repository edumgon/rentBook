# cPanel Git Deployment Configuration for Laravel Book Lending Application
# Official cPanel Git deployment format
# https:/docs.cpanel.net/knowledge-base/web-services/guide-to-git-deployment/

--- deployment:
  tasks:
    - /bin/mkdir -p ../public_html/rentbook.infoeg.com.br
    - /bin/cp -R ../rentBook/* ../public_html/rentbook.infoeg.com.br/
    - /bin/cp -R ../rentBook/public ../public_html/rentbook.infoeg.com.br/public
    - /usr/local/bin/php ../public_html/rentbook.infoeg.com.br/composer.phar install --no-dev --optimize-autoloader
    - /usr/local/bin/php ../public_html/rentbook.infoeg.com.br/artisan key:generate --force
    - /usr/local/bin/php ../public_html/rentbook.infoeg.com.br/artisan migrate --force
    - /usr/local/bin/php ../public_html/rentbook.infoeg.com.br/artisan config:cache
    - /usr/local/bin/php ../public_html/rentbook.infoeg.com.br/artisan route:cache
    - /usr/local/bin/php ../public_html/rentbook.infoeg.com.br/artisan view:cache
    - /bin/chmod -R 755 ../public_html/rentbook.infoeg.com.br/storage ../public_html/rentbook.infoeg.com.br/bootstrap/cache
    
    # Set proper permissions
    - /bin/chmod -R 755 storage bootstrap/cache
    - /bin/chmod 644 .env.example
    
    # Laravel optimization commands
    - /usr/local/bin/php artisan config:clear
    - /usr/local/bin/php artisan config:cache
    - /usr/local/bin/php artisan route:clear
    - /usr/local/bin/php artisan route:cache
    - /usr/local/bin/php artisan view:clear
    - /usr/local/bin/php artisan view:cache
    - /usr/local/bin/php artisan migrate --force
    
    # Create storage directories if they don't exist
    - /bin/mkdir -p storage/framework/cache storage/framework/sessions storage/framework/views storage/logs
    
    # Set writable permissions for storage
    - /bin/chmod -R 755 storage bootstrap/cache
